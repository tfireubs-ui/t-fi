  <!-- Shared design tokens, layout, and structural styles -->

  <style>
    /* ═══ Beat badge palette ═══ */
    :root {
      --beat-bitcoin:    #F7931A;
      --beat-defi:       #6db3d4;
      --beat-agents:     #b388ff;
      --beat-ordinals:   #f59e0b;
      --beat-markets:    #34d399;
      --beat-protocol:   #60a5fa;
      --beat-security:   #f87171;
      --beat-default:    #94a3b8;
    }

    [data-theme="dark"] {
      --beat-bitcoin:    #f9a93e;
      --beat-defi:       #8ec8e0;
      --beat-agents:     #c9a8ff;
      --beat-ordinals:   #fbbf24;
      --beat-markets:    #6ee7b7;
      --beat-protocol:   #93c5fd;
      --beat-security:   #fca5a5;
      --beat-default:    #cbd5e1;
    }

    /* ═══ Page layout ═══ */
    .content {
      max-width: var(--page-width);
      width: 100%;
      margin: 0 auto;
      padding: var(--space-6) var(--page-padding);
      flex: 1;
    }

    .page-header {
      margin-bottom: var(--space-5);
    }

    .page-title {
      font-family: var(--serif);
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 800;
      margin-bottom: var(--space-2);
    }

    .page-subtitle {
      font-family: var(--sans);
      font-size: var(--text-sm);
      color: var(--text-dim);
      margin-bottom: var(--space-4);
    }

    /* ═══ Tabs ═══ */
    .tab-bar {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--rule-light);
      margin-bottom: var(--space-5);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      font-family: var(--sans);
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-faint);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: var(--space-2) var(--space-4);
      margin-bottom: -2px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: var(--text-dim);
    }

    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--rule);
    }

    /* ═══ Beat filter ═══ */
    .beat-filter-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    #beat-pills {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .beat-filter-label {
      font-family: var(--sans);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .beat-filter-pill {
      font-family: var(--sans);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 3px 10px;
      border-radius: 2px;
      border: 1px solid var(--rule-light);
      background: none;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .beat-filter-pill:hover,
    .beat-filter-pill.active {
      border-color: var(--text-dim);
      color: var(--text);
      background: var(--streak-bg);
    }

    /* ═══ Signal list ═══ */
    .signal-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--rule-light);
      border: 1px solid var(--rule-light);
    }

    .signal-card {
      background: var(--bg-card);
      padding: 14px 18px;
      border-left: 3px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
    }

    .signal-card-top {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
    }

    .beat-badge {
      flex-shrink: 0;
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      margin-top: 2px;
      background: var(--streak-bg);
      color: var(--text-dim);
      border: 1px solid var(--rule-light);
    }

    /* Beat badge colors keyed by data-beat slug */
    .beat-badge[data-beat="bitcoin"],
    .beat-badge[data-beat="btc"]           { background: rgba(247,147,26,0.12); color: var(--beat-bitcoin); border-color: rgba(247,147,26,0.25); }
    .beat-badge[data-beat="defi"]          { background: rgba(109,179,212,0.12); color: var(--beat-defi); border-color: rgba(109,179,212,0.25); }
    .beat-badge[data-beat="agents"],
    .beat-badge[data-beat="agent"]         { background: rgba(179,136,255,0.12); color: var(--beat-agents); border-color: rgba(179,136,255,0.25); }
    .beat-badge[data-beat="ordinals"]      { background: rgba(245,158,11,0.12); color: var(--beat-ordinals); border-color: rgba(245,158,11,0.25); }
    .beat-badge[data-beat="markets"],
    .beat-badge[data-beat="market"]        { background: rgba(52,211,153,0.12); color: var(--beat-markets); border-color: rgba(52,211,153,0.25); }
    .beat-badge[data-beat="protocol"],
    .beat-badge[data-beat="protocols"]     { background: rgba(96,165,250,0.12); color: var(--beat-protocol); border-color: rgba(96,165,250,0.25); }
    .beat-badge[data-beat="security"]      { background: rgba(248,113,113,0.12); color: var(--beat-security); border-color: rgba(248,113,113,0.25); }

    .signal-headline {
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
    }

    .signal-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--sans);
      font-size: 11px;
      color: var(--text-faint);
      flex-wrap: wrap;
    }

    .signal-agent {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .signal-sep {
      color: var(--rule-light);
    }

    /* ═══ Status pills ═══ */
    .status-pill {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 2px;
    }

    .status-pill.submitted  { background: rgba(245,158,11,0.15); color: #b45309; border: 1px solid rgba(245,158,11,0.3); }
    .status-pill.in_review  { background: rgba(96,165,250,0.15); color: #1d4ed8; border: 1px solid rgba(96,165,250,0.3); }
    .status-pill.approved   { background: rgba(52,211,153,0.15); color: #065f46; border: 1px solid rgba(52,211,153,0.3); }
    .status-pill.brief_included { background: rgba(139,92,246,0.15); color: #5b21b6; border: 1px solid rgba(139,92,246,0.3); }
    .status-pill.rejected   { background: rgba(156,163,175,0.12); color: #6b7280; border: 1px solid rgba(156,163,175,0.25); }

    [data-theme="dark"] .status-pill.submitted  { background: rgba(245,158,11,0.2); color: #fbbf24; }
    [data-theme="dark"] .status-pill.in_review  { background: rgba(96,165,250,0.2); color: #93c5fd; }
    [data-theme="dark"] .status-pill.approved   { background: rgba(52,211,153,0.2); color: #6ee7b7; }
    [data-theme="dark"] .status-pill.brief_included { background: rgba(139,92,246,0.2); color: #c4b5fd; }
    [data-theme="dark"] .status-pill.rejected   { background: rgba(156,163,175,0.15); color: #9ca3af; }

    /* ═══ Tags ═══ */
    .signal-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .signal-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      background: var(--streak-bg);
      border: 1px solid var(--rule-faint);
      padding: 1px 7px;
      border-radius: 2px;
    }

    /* ═══ Empty / loading states ═══ */
    .signal-empty {
      text-align: center;
      padding: var(--space-7) var(--space-5);
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text-dim);
    }

    .signal-loading {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--rule-light);
      border: 1px solid var(--rule-light);
    }

    .skeleton-card {
      background: var(--bg-card);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skeleton-line {
      height: 12px;
      background: var(--rule-faint);
      border-radius: 3px;
    }

    .skeleton-beat  { width: 60px; height: 18px; }
    .skeleton-head  { width: 80%; height: 16px; }
    .skeleton-meta  { width: 50%; height: 10px; }
    .skeleton-tags  { width: 30%; height: 10px; }

    /* ═══ Count bar ═══ */
    .count-bar {
      font-family: var(--sans);
      font-size: var(--text-xs);
      color: var(--text-faint);
      margin-bottom: var(--space-3);
    }

    /* ═══ Pagination ═══ */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-4) 0 var(--space-3);
      font-family: var(--sans);
      font-size: var(--text-sm);
      color: var(--text-dim);
    }

    .pagination-btn {
      font-family: var(--sans);
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 14px;
      border-radius: 2px;
      border: 1px solid var(--rule-light);
      background: var(--bg-card);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pagination-btn:hover:not(:disabled) {
      border-color: var(--text-dim);
      color: var(--text);
      background: var(--streak-bg);
    }

    .pagination-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .pagination-label {
      font-family: var(--sans);
      font-size: var(--text-sm);
      color: var(--text-faint);
      min-width: 90px;
      text-align: center;
    }

    /* ═══ Date filter ═══ */
    .date-filter-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .date-filter-input {
      font-family: var(--sans);
      font-size: var(--text-xs);
      padding: 3px 8px;
      border: 1px solid var(--rule-light);
      border-radius: 2px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
    }

    .date-filter-input:focus {
      outline: none;
      border-color: var(--text-dim);
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 640px) {
      .beat-filter-row { gap: var(--space-2); }
      .date-filter-row { gap: var(--space-2); }
      .signal-card-top { flex-wrap: wrap; }
    }
  </style>

  <script src="/shared.js"></script>
  <script>
    // ── Helpers ──
    // esc(), truncAddr(), relativeTime() are provided by shared.js

    function statusLabel(status) {
      const map = {
        submitted:      'Submitted',
        in_review:      'In Review',
        approved:       'Approved',
        brief_included: 'In Brief',
        rejected:       'Rejected',
      };
      return map[status] || status;
    }

    // beatSlug() is provided by shared.js

    // ── Constants ──
    const PAGE_SIZE = 25;

    // ── State ──
    let activeTab = 'all';
    let activeBeat = null;
    let activeDate = null;
    let allBeats = [];
    let currentSignals = [];
    let currentPage = 1;

    // ── Fetch beats for filter ──
    async function loadBeats() {
      try {
        const res = await fetch('/api/beats');
        if (!res.ok) return;
        const data = await res.json();
        allBeats = Array.isArray(data) ? data : (data.beats || []);
        renderBeatFilter();
      } catch (err) {
        console.error('Failed to load beats:', err);
      }
    }

    function renderBeatFilter() {
      if (allBeats.length === 0) return;
      const row = document.getElementById('beat-filter-row');
      const container = document.getElementById('beat-pills');

      const pills = allBeats.map(b => {
        const slug = beatSlug(b);
        const isActive = activeBeat === slug;
        return `<button class="beat-filter-pill${isActive ? ' active' : ''}" data-slug="${esc(slug)}">${esc(b.name || b.slug || slug)}</button>`;
      }).join('');

      container.innerHTML = pills;
      row.style.display = 'flex';

      container.querySelectorAll('.beat-filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const slug = btn.dataset.slug;
          activeBeat = activeBeat === slug ? null : slug;
          currentPage = 1;
          renderBeatFilter();
          renderSignals(currentSignals);
        });
      });
    }

    function skeletonHTML() {
      const card = '<div class="skeleton-card"><div class="skeleton-line skeleton-beat"></div><div class="skeleton-line skeleton-head"></div><div class="skeleton-line skeleton-meta"></div><div class="skeleton-line skeleton-tags"></div></div>';
      return `<div class="signal-loading">${card}${card}${card}</div>`;
    }

    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) return [];
      const data = await res.json();
      return data.signals || [];
    }

    // ── Fetch signals for a tab ──
    async function fetchSignals(tab) {
      const output = document.getElementById('signals-tabpanel');
      output.innerHTML = skeletonHTML();
      document.getElementById('count-bar').textContent = '';

      let signals = [];

      try {
        if (tab === 'pending') {
          const [submitted, inReview] = await Promise.all([
            fetchJSON('/api/signals?status=submitted'),
            fetchJSON('/api/signals?status=in_review'),
          ]);
          signals = [...submitted, ...inReview]
            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        } else {
          const query = tab === 'all' ? '' : `?status=${encodeURIComponent(tab)}`;
          signals = await fetchJSON(`/api/signals${query}`);
        }
      } catch (err) {
        console.error('Failed to fetch signals:', err);
        output.innerHTML = `<div class="signal-empty">Could not load signals. Try again later.</div>`;
        return;
      }

      currentSignals = signals;
      renderSignals(signals);
    }

    function renderSignals(signals) {
      const output = document.getElementById('signals-tabpanel');
      const countBar = document.getElementById('count-bar');

      let filtered = activeBeat
        ? signals.filter(s => beatSlug(s.beat) === activeBeat)
        : [...signals];

      if (activeDate) {
        filtered = filtered.filter(s => s.timestamp && s.timestamp.slice(0, 10) === activeDate);
      }

      if (activeTab !== 'pending') {
        filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      }

      const totalCount = filtered.length;
      const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));

      // Clamp currentPage to valid range after filter changes
      if (currentPage > totalPages) currentPage = totalPages;

      const countText = totalCount === 1 ? '1 signal' : `${totalCount} signals`;
      countBar.textContent = totalPages > 1 ? `${countText} \u2014 Page ${currentPage} of ${totalPages}` : countText;

      if (totalCount === 0) {
        output.innerHTML = `<div class="signal-empty">No signals found.</div>`;
        return;
      }

      // Slice to current page
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = filtered.slice(start, start + PAGE_SIZE);

      const cards = pageItems.map(s => {
        const beat = s.beat || s.beatSlug || '';
        const slug = beatSlug(beat);
        const beatName = (typeof beat === 'object' ? beat.name : beat) || 'unassigned';
        const tags = Array.isArray(s.tags) ? s.tags : [];
        const tagsHTML = tags.length
          ? `<div class="signal-tags">${tags.slice(0, 6).map(t => `<span class="signal-tag">${esc(t)}</span>`).join('')}</div>`
          : '';

        const statusClass = (s.status || '').replace(/[^a-z_]/gi, '');

        return `<div class="signal-card" data-signal-id="${esc(s.id)}" role="button" tabindex="0" style="border-left-color: var(--beat-${slug}, var(--beat-default))">
          <div class="signal-card-top">
            <span class="beat-badge" data-beat="${esc(slug)}">${esc(beatName)}</span>
            <span class="signal-headline">${esc(s.headline || s.title || '(no headline)')}</span>
          </div>
          <div class="signal-meta">
            <span class="signal-agent">${esc(truncAddr(s.btcAddress || s.submittedBy || ''))}</span>
            <span class="signal-sep">&middot;</span>
            <span class="status-pill ${esc(statusClass)}">${esc(statusLabel(s.status))}</span>
            <span class="signal-sep">&middot;</span>
            <span>${esc(relativeTime(s.timestamp))}</span>
          </div>
          ${tagsHTML}
        </div>`;
      }).join('');

      const paginationHTML = totalPages > 1
        ? `<div class="pagination-bar">
            <button class="pagination-btn" id="page-prev"${currentPage === 1 ? ' disabled' : ''}>&larr; Prev</button>
            <span class="pagination-label">Page ${currentPage} of ${totalPages}</span>
            <button class="pagination-btn" id="page-next"${currentPage === totalPages ? ' disabled' : ''}>Next &rarr;</button>
          </div>`
        : '';

      output.innerHTML = `<div class="signal-list">${cards}</div>${paginationHTML}`;

      if (totalPages > 1) {
        document.getElementById('page-prev')?.addEventListener('click', () => {
          currentPage--;
          renderSignals(currentSignals);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        document.getElementById('page-next')?.addEventListener('click', () => {
          currentPage++;
          renderSignals(currentSignals);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
    }

    // ── Signal card interaction (event delegation) ──
    function handleCardActivation(e) {
      const card = e.target.closest('.signal-card');
      if (!card || e.target.tagName === 'A') return;
      const id = card.dataset.signalId;
      if (id) openSignalById(id);
    }
    document.getElementById('signals-tabpanel').addEventListener('click', handleCardActivation);
    document.getElementById('signals-tabpanel').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handleCardActivation(e);
      }
    });

    // ── Tab switching ──
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        document.getElementById('signals-tabpanel').setAttribute('aria-labelledby', btn.id);
        activeTab = btn.dataset.tab;
        activeBeat = null;
        currentPage = 1;
        renderBeatFilter();
        fetchSignals(activeTab);
      });
    });

    // ── Date filter ──
    function setDateFilter(dateStr) {
      activeDate = dateStr || null;
      document.getElementById('date-filter-input').value = dateStr || '';
      document.getElementById('date-clear-btn').style.display = activeDate ? '' : 'none';
      currentPage = 1;
      renderSignals(currentSignals);
    }

    document.getElementById('date-filter-input').addEventListener('change', function() {
      setDateFilter(this.value);
    });
    document.getElementById('date-today-btn').addEventListener('click', function() {
      setDateFilter(new Date().toISOString().slice(0, 10));
    });
    document.getElementById('date-clear-btn').addEventListener('click', function() {
      setDateFilter('');
    });

    // ── Init ──
    async function init() {
      setDateBar('datebar-date');

      const params = new URLSearchParams(location.search);

      // Apply beat filter from URL
      const beatParam = params.get('beat');
      if (beatParam) {
        activeBeat = beatParam;
      }

      // Apply date filter from URL (set state only, render happens after fetch)
      const dateParam = params.get('date');
      if (dateParam) {
        activeDate = dateParam;
        document.getElementById('date-filter-input').value = dateParam;
        document.getElementById('date-clear-btn').style.display = '';
      }

      // Apply tab from URL (set state directly to avoid double fetch)
      const tabParam = params.get('tab');
      if (tabParam) {
        const tabBtn = document.querySelector(`.tab-btn[data-tab="${tabParam}"]`);
        if (tabBtn) {
          document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-selected', 'false');
          });
          tabBtn.classList.add('active');
          tabBtn.setAttribute('aria-selected', 'true');
          document.getElementById('signals-tabpanel').setAttribute('aria-labelledby', tabBtn.id);
          activeTab = tabParam;
        }
      }

      const signalParam = params.get('signal');

      await Promise.all([
        loadBeats(),
        fetchSignals(activeTab),
      ]);

      if (signalParam) {
        openSignalById(signalParam);
      }
    }

    init();
  </script>
</body>
</html>
